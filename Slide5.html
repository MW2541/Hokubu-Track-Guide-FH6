<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .slide {
    position: relative;
    width: min(100vw, calc(95vh * 1.7778));
  }

  .slide img {
    display: block;
    width: 100%;
    height: auto;
  }

  .backbutton {
    position: absolute;
    left: 88.3%;
    top: 95%;
    width: 8.6%;
    height: 3.9%;
    z-index: 9999;
  }
</style>
</head>

<body>

<div class="slide">
  <img src="Slide6.png">
  <a class="backbutton" href="index.html"></a>
</div>

</body>
</html>
