<!DOCTYPE html>
<html>
<head>
  <title>Interactive Track Guide</title>
  <link rel="icon" href="favicon.ico">
  <style>
    html, body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide {
      position: relative;
      width: min(100vw, calc(95vh * 1.7778));
    }

    .slide img {
      display: block;
      width: 100%;
      height: auto;   
    }

    .button {
      position: absolute;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .button:hover {
      border: 2px solid transparent;
    }
  </style>
  
<meta property="og:title" content="Hokubu Track Guide FH6">
<meta property="og:description" content="Interactive guide to the Hokubu Circuit.">
<meta property="og:image" content="Slide1.png">
<meta property="og:type" content="website">
</head>
<body>

<div class="slide">
  <img src="Slide1.png">

  <!-- Example clickable areas -->

  <a class="button" href="Slide5.html" style="left:59.75%; top:30%; width:3%; height:7%;"></a>
  <a class="button" href="Slide6.html" style="left:70%; top:41%; width:3%; height:7%;"></a>

  <a class="button" href="Slide8.html" style="left:88%; top:80.5%; width:3%; height:7%;"></a>
</div>

</body>
</html>
